name: Windows Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GOPATH: C:\work

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # fetch-depth=1, no-tags: avoids case-collision in the thousands of
      # upstream branches (Windows is case-insensitive).
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: src\github.com\keybase\client
          fetch-depth: 1
          fetch-tags: false

      # ── Go ────────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src\github.com\keybase\client\go\go.sum

      # ── Node / Yarn ────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      # ── WIX ───────────────────────────────────────────────────────────────
      # windows-2022 runners ship WiX 3.14 but it may not be on PATH.
      # Use PS 5.1-compatible syntax (no ?. operator).
      - name: Add WIX to PATH
        shell: powershell
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if ($candle) {
            Write-Host "WiX already on PATH: $($candle.Source)"
          } else {
            $candidates = @(
              "C:\Program Files (x86)\WiX Toolset v3.14\bin",
              "C:\Program Files (x86)\WiX Toolset v3.11\bin",
              "C:\Program Files\WiX Toolset v3.14\bin",
              "C:\Program Files\WiX Toolset v3.11\bin"
            )
            $found = $false
            foreach ($c in $candidates) {
              if (Test-Path "$c\candle.exe") {
                Add-Content -Path $env:GITHUB_PATH -Value $c
                Write-Host "WiX found and added to PATH: $c"
                $found = $true
                break
              }
            }
            if (-not $found) {
              # Last resort: search entire ProgramFiles
              $exe = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if (-not $exe) {
                $exe = Get-ChildItem "C:\Program Files" -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              }
              if ($exe) {
                Add-Content -Path $env:GITHUB_PATH -Value $exe.DirectoryName
                Write-Host "WiX found via search: $($exe.FullName)"
              } else {
                Write-Error "WiX candle.exe not found anywhere!"
                exit 1
              }
            }
          }

      # ── MinGW (for kbfsdokan CGO build) ───────────────────────────────────
      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false
          add-to-path: true

      # ── GOPATH layout ─────────────────────────────────────────────────────
      - name: Configure GOPATH layout
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\work\src\github.com\keybase" | Out-Null
          # Use junction (no admin required) to wire the checkout into GOPATH
          $target = "$env:GITHUB_WORKSPACE\src\github.com\keybase\client"
          $link   = "C:\work\src\github.com\keybase\client"
          if (-not (Test-Path $link)) {
            cmd /c mklink /J "$link" "$target"
          }

      # ── Build winresource (version stamping tool) ─────────────────────────
      - name: Build winresource
        working-directory: C:\work\src\github.com\keybase\client\go\keybase
        env:
          GOPATH: C:\work
        run: go generate

      # ── Go service executables ─────────────────────────────────────────────
      - name: Build keybase.exe
        working-directory: C:\work\src\github.com\keybase\client\go\keybase
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
          KEYBASE_WINBUILD: ${{ github.run_number }}
        run: |
          for /f %%i in ('winresource.exe -cb') do set KEYBASE_BUILD=%%i
          go build -a -tags "prerelease production" -ldflags="-X github.com/keybase/client/go/libkb.PrereleaseBuild=%KEYBASE_BUILD% -s -w"

      - name: Build kbfsdokan.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbfs\kbfsdokan
        env:
          GOPATH: C:\work
          CGO_ENABLED: 1
        run: go build -a -tags "prerelease production" -ldflags="-s -w"

      - name: Build git-remote-keybase.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbfs\kbfsgit\git-remote-keybase
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -a

      - name: Build upd.exe (updater)
        working-directory: C:\work\src\github.com\keybase\client\go\updater\service
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -a -o upd.exe

      - name: Build kbnm.exe (browser extension)
        working-directory: C:\work\src\github.com\keybase\client\go\kbnm
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -a

      - name: Build keybaserq.exe (quiet launcher)
        working-directory: C:\work\src\github.com\keybase\client\go\tools\runquiet
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: |
          ..\..\keybase\winresource.exe -d "Keybase quiet start utility" -n "keybaserq.exe" -i ..\..\..\media\icons\Keybase.ico
          go build -ldflags "-H windowsgui" -o keybaserq.exe

      # ── WPF Prompter (updater GUI, requires MSBuild/.NET) ─────────────────
      - name: Build prompter.exe (WPF updater)
        working-directory: C:\work\src\github.com\keybase\client\go\updater\windows\WpfPrompter
        run: |
          msbuild WpfPrompter.sln /t:Build /p:Configuration=Release /p:Platform=AnyCPU -nologo

      # ── Electron UI ──────────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: C:\work\src\github.com\keybase\client\shared
        run: |
          yarn install --pure-lockfile --ignore-optional --ignore-scripts
          yarn postinstall
          cd node_modules\electron && yarn

      - name: Package Electron (win32-x64)
        working-directory: C:\work\src\github.com\keybase\client\shared
        env:
          GOPATH: C:\work
        run: |
          for /f %%i in ('C:\work\src\github.com\keybase\client\go\keybase\winresource.exe -cv') do set KEYBASE_VERSION=%%i
          yarn run package --arch=x64 --platform=win32 --appVersion=%KEYBASE_VERSION% --icon=C:\work\src\github.com\keybase\client\media\icons\Keybase.ico

      # WIX heat fails if a folder contains only subdirs (no files) — pad them
      - name: Pad empty Electron folders for WIX
        shell: powershell
        working-directory: C:\work\src\github.com\keybase\client\shared\desktop\release\win32-x64\Keybase-win32-x64
        run: |
          Get-ChildItem -Recurse -Directory | ForEach-Object {
            if (@(Get-ChildItem -Path $_.FullName -File).Count -eq 0) {
              New-Item -Path (Join-Path $_.FullName "EmptyFile.txt") -ItemType File -Force | Out-Null
            }
          }

      # ── WIX Installer (unsigned / debug mode) ────────────────────────────
      - name: Build WIX installer (unsigned)
        working-directory: C:\work\src\github.com\keybase\client\packaging\windows
        env:
          GOPATH: C:\work
          KEYBASE_WINBUILD: ${{ github.run_number }}
        run: call doinstaller_wix.cmd debug

      # ── Collect + upload ──────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: keybase-windows-installer
          path: C:\work\src\github.com\keybase\client\packaging\windows\**\*.msi
          if-no-files-found: warn
          retention-days: 30

      # ── Release on tag ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: C:\work\src\github.com\keybase\client\packaging\windows\**\*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
