name: Windows Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GOPATH: C:\work

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: src\github.com\keybase\client
          fetch-depth: 1
          fetch-tags: false

      # ── Go ────────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src\github.com\keybase\client\go\go.sum

      # ── Node / Yarn ────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      # ── Cache node_modules ─────────────────────────────────────────────────
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: src\github.com\keybase\client\shared\node_modules
          key: node-modules-${{ hashFiles('src/github.com/keybase/client/shared/yarn.lock') }}
          restore-keys: node-modules-

      # ── Cache Electron binary ──────────────────────────────────────────────
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            src\github.com\keybase\client\shared\node_modules\electron\dist
            ~\AppData\Local\electron\Cache
          key: electron-${{ hashFiles('src/github.com/keybase/client/shared/package.json') }}
          restore-keys: electron-

      # ── WIX ───────────────────────────────────────────────────────────────
      - name: Add WIX to PATH
        shell: powershell
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if ($candle) {
            Write-Host "WiX already on PATH: $($candle.Source)"
          } else {
            $candidates = @(
              "C:\Program Files (x86)\WiX Toolset v3.14\bin",
              "C:\Program Files (x86)\WiX Toolset v3.11\bin",
              "C:\Program Files\WiX Toolset v3.14\bin",
              "C:\Program Files\WiX Toolset v3.11\bin"
            )
            $found = $false
            foreach ($c in $candidates) {
              if (Test-Path "$c\candle.exe") {
                Add-Content -Path $env:GITHUB_PATH -Value $c
                Write-Host "WiX found and added to PATH: $c"
                $found = $true
                break
              }
            }
            if (-not $found) {
              $exe = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if (-not $exe) {
                $exe = Get-ChildItem "C:\Program Files" -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              }
              if ($exe) {
                Add-Content -Path $env:GITHUB_PATH -Value $exe.DirectoryName
                Write-Host "WiX found via search: $($exe.FullName)"
              } else {
                Write-Error "WiX candle.exe not found anywhere!"
                exit 1
              }
            }
          }

      # ── MinGW (for kbfsdokan CGO build) ───────────────────────────────────
      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false
          add-to-path: true

      # ── GOPATH layout ─────────────────────────────────────────────────────
      - name: Configure GOPATH layout
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\work\src\github.com\keybase" | Out-Null
          $target = "$env:GITHUB_WORKSPACE\src\github.com\keybase\client"
          $link   = "C:\work\src\github.com\keybase\client"
          if (-not (Test-Path $link)) {
            cmd /c mklink /J "$link" "$target"
          }

      # ── Build winresource ─────────────────────────────────────────────────
      - name: Build winresource
        working-directory: C:\work\src\github.com\keybase\client\go\keybase
        env:
          GOPATH: C:\work
        run: go generate

      # ── Go service executables ─────────────────────────────────────────────
      # No -a flag: Go's build cache handles incremental compilation.
      - name: Build keybase.exe
        working-directory: C:\work\src\github.com\keybase\client\go\keybase
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
          KEYBASE_WINBUILD: ${{ github.run_number }}
        run: |
          for /f %%i in ('winresource.exe -cb') do set KEYBASE_BUILD=%%i
          go build -tags "prerelease production" -ldflags="-X github.com/keybase/client/go/libkb.PrereleaseBuild=%KEYBASE_BUILD% -s -w"

      - name: Build kbfsdokan.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbfs\kbfsdokan
        env:
          GOPATH: C:\work
          CGO_ENABLED: 1
        run: go build -tags "prerelease production" -ldflags="-s -w"

      - name: Build git-remote-keybase.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbfs\kbfsgit\git-remote-keybase
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build

      - name: Build upd.exe (updater)
        working-directory: C:\work\src\github.com\keybase\client\go\updater\service
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -o upd.exe

      - name: Build kbnm.exe (browser extension)
        working-directory: C:\work\src\github.com\keybase\client\go\kbnm
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build

      - name: Build keybaserq.exe (quiet launcher)
        working-directory: C:\work\src\github.com\keybase\client\go\tools\runquiet
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: |
          ..\..\keybase\winresource.exe -d "Keybase quiet start utility" -n "keybaserq.exe" -i ..\..\..\media\icons\Keybase.ico
          go build -ldflags "-H windowsgui" -o keybaserq.exe

      # ── WPF Prompter ─────────────────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build prompter.exe (WPF updater)
        working-directory: C:\work\src\github.com\keybase\client\go\updater\windows\WpfPrompter
        run: |
          msbuild WpfPrompter.sln /t:Build /p:Configuration=Release "/p:Platform=Any CPU" /nologo

      # ── Electron UI ──────────────────────────────────────────────────────
      - name: Install JS dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: C:\work\src\github.com\keybase\client\shared
        run: yarn install --pure-lockfile --ignore-optional --ignore-scripts

      # Write a low-level Babel transform shim that works with Node 20.
      #
      # Root cause of all previous failures: Node 20.20 added importSyncForRequire —
      # when require() encounters a file with import/export syntax, it routes through
      # the ESM compiler BEFORE any _compile hooks (like pirates/@babel/register) fire.
      # The ESM compiler then chokes on TypeScript syntax.
      #
      # Fix: install Module._extensions hooks that call babel.transformSync() and
      # write the output back via m._compile() as pure CommonJS — no import/export
      # in the output, so Node 20's ESM interop path never triggers.
      - name: Write babel shim
        shell: powershell
        working-directory: C:\work\src\github.com\keybase\client\shared
        run: |
          Set-Content -Path yarn-runner.js -Encoding UTF8 -Value @'
          // Babel shim for Node 20: hooks Module._extensions to transpile .tsx/.ts
          // to pure CommonJS BEFORE Node's importSyncForRequire ESM detector fires.
          //
          // Also patches child_process.execSync so that "yarn _node" invocations
          // (used by the "package" command in build.tsx) are rewritten to use
          // yarn-shim.js instead of babel-node -- babel-node breaks on Node 20.20
          // because importSyncForRequire routes .tsx files through the ESM compiler
          // before babel-node's hooks can intercept them.
          const babel  = require("@babel/core");
          const Module = require("module");
          const cp     = require("child_process");
          const fs     = require("fs");
          const path   = require("path");

          const OPTS = {
            presets: [
              ["@babel/preset-env", { targets: { node: "current" }, modules: "commonjs" }],
              ["@babel/preset-typescript"],
            ],
            sourceType: "module",
            caller: { name: "@babel/node" },
          };

          function hook(ext) {
            Module._extensions[ext] = function(m, filename) {
              const src    = fs.readFileSync(filename, "utf8");
              const result = babel.transformSync(src, { ...OPTS, filename });
              m._compile(result.code, filename);
            };
          }
          hook(".tsx");
          hook(".ts");

          // Write yarn-shim.js: bare babel hooks + require(argv[2])
          // Used as the Node entry point when babel-node would normally be called.
          const shimPath = path.resolve(__dirname, "yarn-shim.js");
          const shimCode = [
            "const babel  = require(\"@babel/core\");",
            "const Module = require(\"module\");",
            "const fs     = require(\"fs\");",
            "const path   = require(\"path\");",
            "const OPTS = {",
            "  presets: [",
            "    [\"@babel/preset-env\", { targets: { node: \"current\" }, modules: \"commonjs\" }],",
            "    [\"@babel/preset-typescript\"],",
            "  ],",
            "  sourceType: \"module\",",
            "  caller: { name: \"@babel/node\" },",
            "};",
            "function hook(ext) {",
            "  Module._extensions[ext] = function(m, filename) {",
            "    const src    = fs.readFileSync(filename, \"utf8\");",
            "    const result = babel.transformSync(src, { ...OPTS, filename });",
            "    m._compile(result.code, filename);",
            "  };",
            "}",
            "hook(\".tsx\");",
            "hook(\".ts\");",
            "require(path.resolve(process.cwd(), process.argv[2]));",
          ].join("\n");
          fs.writeFileSync(shimPath, shimCode);

          // Monkey-patch execSync: replace "yarn _node" with "node yarn-shim.js"
          // so that child processes spawned by index.tsx also use our babel hook
          // instead of the broken babel-node ESM path on Node 20.20.
          const _execSync = cp.execSync;
          cp.execSync = function(cmd, opts) {
            if (typeof cmd === "string" && /\byarn _node\b/.test(cmd)) {
              cmd = cmd.replace(
                /\byarn _node\b\s*(--max_old_space_size=\S+)?\s*/,
                function(_, memArg) {
                  let out = "node ";
                  if (memArg) out += memArg.replace("--max_old_space_size=", "--max-old-space-size=") + " ";
                  return out + "yarn-shim.js ";
                }
              );
              process.stderr.write("[yarn-runner] rewritten cmd: " + cmd + "\n");
            }
            return _execSync.call(this, cmd, opts);
          };

          require("./desktop/yarn-helper/index.tsx");
          '@

      - name: Run postinstall
        working-directory: C:\work\src\github.com\keybase\client\shared
        run: |
          set "PATH=%CD%\node_modules\.bin;%PATH%"
          node yarn-runner.js postinstall

      - name: Electron postinstall
        working-directory: C:\work\src\github.com\keybase\client\shared\node_modules\electron
        run: node install.js

      - name: Package Electron (win32-x64)
        working-directory: C:\work\src\github.com\keybase\client\shared
        env:
          GOPATH: C:\work
        run: |
          set "PATH=%CD%\node_modules\.bin;%PATH%"
          for /f %%i in ('C:\work\src\github.com\keybase\client\go\keybase\winresource.exe -cv') do set KEYBASE_VERSION=%%i
          node yarn-runner.js package --arch=x64 --platform=win32 --appVersion=%KEYBASE_VERSION% --icon=C:\work\src\github.com\keybase\client\media\icons\Keybase.ico

      # WIX heat fails on folders with no files — pad them
      - name: Pad empty Electron folders for WIX
        shell: powershell
        working-directory: C:\work\src\github.com\keybase\client\shared\desktop\release\win32-x64\Keybase-win32-x64
        run: |
          Get-ChildItem -Recurse -Directory | ForEach-Object {
            if (@(Get-ChildItem -Path $_.FullName -File).Count -eq 0) {
              New-Item -Path (Join-Path $_.FullName "EmptyFile.txt") -ItemType File -Force | Out-Null
            }
          }

      # ── WIX Installer (unsigned / debug mode) ────────────────────────────
      - name: Build WIX installer (unsigned)
        working-directory: C:\work\src\github.com\keybase\client\packaging\windows
        env:
          GOPATH: C:\work
          KEYBASE_WINBUILD: ${{ github.run_number }}
        run: call doinstaller_wix.cmd debug

      # ── Collect + upload ──────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: keybase-windows-installer
          path: C:\work\src\github.com\keybase\client\packaging\windows\**\*.msi
          if-no-files-found: warn
          retention-days: 30

      # ── Release on tag ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: C:\work\src\github.com\keybase\client\packaging\windows\**\*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
