name: Windows Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GOPATH: C:\work
  GOARCH: amd64
  CGO_ENABLED: 0

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    defaults:
      run:
        shell: cmd

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: src\github.com\keybase\client
          fetch-depth: 0

      # ── Go ────────────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src\github.com\keybase\client\go\go.sum

      # ── Node / Yarn ────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      # ── WIX Toolset ────────────────────────────────────────────────────────
      - name: Install WIX Toolset 3.11
        run: |
          choco install wixtoolset --version=3.11.2 -y --no-progress
          echo C:\Program Files (x86)\WiX Toolset v3.11\bin >> %GITHUB_PATH%

      # ── MinGW (for kbfsdokan CGO build) ───────────────────────────────────
      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          update: false
          add-to-path: true

      # ── PATH setup ────────────────────────────────────────────────────────
      - name: Configure GOPATH layout
        run: |
          mkdir C:\work\src\github.com\keybase 2>NUL || exit 0
          mklink /J C:\work\src\github.com\keybase\client %GITHUB_WORKSPACE%\src\github.com\keybase\client
        shell: cmd

      # ── Build winresource (needed for version stamping) ───────────────────
      - name: Build winresource
        working-directory: C:\work\src\github.com\keybase\client\go\keybase
        run: |
          set GOPATH=C:\work
          go generate
        env:
          GOPATH: C:\work

      # ── Build Go service executables ──────────────────────────────────────
      - name: Build keybase.exe
        working-directory: C:\work\src\github.com\keybase\client\go\keybase
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
          KEYBASE_WINBUILD: ${{ github.run_number }}
        run: |
          for /f %%i in ('winresource.exe -cv') do set KEYBASE_VERSION=%%i
          for /f %%i in ('winresource.exe -cb') do set KEYBASE_BUILD=%%i
          go build -a -tags "prerelease production" -ldflags="-X github.com\keybase\client\go\libkb.PrereleaseBuild=%KEYBASE_BUILD% -s -w"

      - name: Build kbfsdokan.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbfs\kbfsdokan
        env:
          GOPATH: C:\work
          CGO_ENABLED: 1
        run: go build -a -tags "prerelease production" -ldflags="-s -w"

      - name: Build git-remote-keybase.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbfs\kbfsgit\git-remote-keybase
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -a

      - name: Build updater (upd.exe)
        working-directory: C:\work\src\github.com\keybase\client\go\updater\service
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -a -o upd.exe

      - name: Build kbnm.exe
        working-directory: C:\work\src\github.com\keybase\client\go\kbnm
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: go build -a

      - name: Build keybaserq.exe
        working-directory: C:\work\src\github.com\keybase\client\go\tools\runquiet
        env:
          GOPATH: C:\work
          CGO_ENABLED: 0
        run: |
          ..\..\keybase\winresource.exe -d "Keybase quiet start utility" -n "keybaserq.exe" -i ..\..\..\media\icons\Keybase.ico
          go build -ldflags "-H windowsgui" -o keybaserq.exe

      # ── Build Electron UI ─────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: C:\work\src\github.com\keybase\client\shared
        run: yarn install --pure-lockfile --ignore-optional --ignore-scripts && yarn postinstall && cd node_modules\electron && yarn

      - name: Package Electron (win32-x64)
        working-directory: C:\work\src\github.com\keybase\client\shared
        env:
          GOPATH: C:\work
        run: |
          for /f %%i in ('C:\work\src\github.com\keybase\client\go\keybase\winresource.exe -cv') do set KEYBASE_VERSION=%%i
          yarn run package --arch=x64 --platform=win32 --appVersion=%KEYBASE_VERSION% --icon=C:\work\src\github.com\keybase\client\media\icons\Keybase.ico

      # Pad empty folders (WIX heat workaround)
      - name: Pad empty Electron folders for WIX
        working-directory: C:\work\src\github.com\keybase\client\shared\desktop\release\win32-x64\Keybase-win32-x64
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Directory | ForEach-Object {
            $files = Get-ChildItem -Path $_.FullName -File
            if ($files.Count -eq 0) {
              New-Item -Path (Join-Path $_.FullName "EmptyFile.txt") -ItemType File -Force | Out-Null
            }
          }

      # ── Build WIX Installer (debug/unsigned) ─────────────────────────────
      - name: Build WIX installer (unsigned)
        working-directory: C:\work\src\github.com\keybase\client\packaging\windows
        env:
          GOPATH: C:\work
          KEYBASE_WINBUILD: ${{ github.run_number }}
        run: |
          set SIGNTOOL=echo
          set CONFIGURATION=Debug
          call doinstaller_wix.cmd debug

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: keybase-windows-installer
          path: |
            C:\work\src\github.com\keybase\client\packaging\windows\WIXInstallers\**\*.msi
          retention-days: 30

      # ── Create release on tag ─────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            C:\work\src\github.com\keybase\client\packaging\windows\WIXInstallers\**\*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
